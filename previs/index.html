<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>BnBrooklyn — Cartesian Shelf</title>
<style>
  :root { color-scheme: dark; }
  html, body { margin: 0; height: 100%; background: #14140f; font-family: -apple-system, "Helvetica Neue", Arial, sans-serif; overflow: hidden; }
  canvas { display: block; }

  #panel {
    position: fixed;
    top: 16px;
    left: 16px;
    width: 260px;
    padding: 16px 18px;
    background: rgba(20, 20, 15, 0.72);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 10px;
    color: #e8e4d8;
  }
  #panel h1 {
    font-size: 13px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin: 0;
    color: #f2b64c;
  }
  .panelHead {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
  }
  .panelHead h1, .panelHead h2 { margin: 0; }
  .shuffleBtn {
    background: transparent;
    border: none;
    color: #8a8672;
    cursor: pointer;
    padding: 3px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 4px;
  }
  .shuffleBtn:hover { color: #f2b64c; background: rgba(255,255,255,0.06); }
  .shuffleBtn svg { width: 14px; height: 14px; display: block; }
  .row { margin-bottom: 14px; }
  .row label {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    margin-bottom: 6px;
    color: #cfcabb;
  }
  .row label .val, .padrow .val {
    color: #f2b64c;
    font-variant-numeric: tabular-nums;
    background: none;
    border: 1px solid transparent;
    border-radius: 4px;
    font: inherit;
    text-align: right;
    width: 72px;
    padding: 0 4px;
  }
  .row label .val:hover, .padrow .val:hover {
    border-color: rgba(242, 182, 76, 0.3);
  }
  .row label .val:focus, .padrow .val:focus {
    border-color: #f2b64c;
    outline: none;
  }
  #pad {
    position: fixed;
    top: 16px;
    right: 16px;
    width: 224px;
    padding: 14px 16px;
    background: rgba(20, 20, 15, 0.72);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 10px;
    color: #e8e4d8;
  }
  #pad h2 {
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin: 0;
    color: #f2b64c;
  }
  #padCanvas {
    display: block;
    width: 100%;
    height: 140px;
    border-radius: 6px;
    touch-action: none;
    cursor: crosshair;
  }
  .padrow {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    font-size: 12px;
    color: #cfcabb;
    margin-top: 8px;
  }
  .padrow .pmm {
    font-size: 10px;
    color: #706c5c;
    min-width: 56px;
    text-align: right;
  }
  .row input[type="range"] {
    width: 100%;
    accent-color: #f2b64c;
  }
  .row .mm {
    font-size: 10px;
    color: #706c5c;
    margin-top: 2px;
    text-align: right;
  }
  #units {
    display: flex;
    gap: 6px;
    margin-bottom: 14px;
  }
  #units button {
    flex: 1;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    color: #cfcabb;
    padding: 5px 0;
    border-radius: 6px;
    font-size: 11px;
    cursor: pointer;
  }
  #units button.active {
    background: #f2b64c;
    color: #14140f;
    border-color: #f2b64c;
    font-weight: 600;
  }
  /* Row-name buttons doubling as color swatches — background is set inline
     per element's current color; clicking opens the color picker popover. */
  .swatchLabel {
    font: inherit;
    font-size: 12px;
    padding: 3px 9px;
    border-radius: 6px;
    border: 1px solid rgba(255,255,255,0.15);
    cursor: pointer;
    line-height: 1.3;
  }
  .swatchLabel:hover { border-color: rgba(242,182,76,0.6); }

  .colorPopover {
    display: none;
    position: fixed;
    z-index: 300;
    width: 174px;
    padding: 12px;
    background: rgba(20, 20, 15, 0.96);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 10px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.5);
  }
  .wheelWrap {
    position: relative;
    width: 150px;
    height: 150px;
    margin: 0 auto 10px;
  }
  #colorWheel {
    display: block;
    width: 150px;
    height: 150px;
    border-radius: 50%;
    cursor: crosshair;
  }
  .wheelKnob {
    position: absolute;
    width: 12px;
    height: 12px;
    margin-left: -6px;
    margin-top: -6px;
    border-radius: 50%;
    border: 2px solid #f2ede0;
    box-shadow: 0 0 0 1px rgba(0,0,0,0.5);
    pointer-events: none;
  }
  #colorBright {
    width: 100%;
    height: 12px;
    margin: 0 0 10px;
    appearance: none;
    -webkit-appearance: none;
    border-radius: 6px;
    outline: none;
  }
  #colorBright::-webkit-slider-thumb {
    appearance: none;
    -webkit-appearance: none;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: #f2ede0;
    border: 2px solid #14140f;
    cursor: pointer;
  }
  #colorBright::-moz-range-thumb {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: #f2ede0;
    border: 2px solid #14140f;
    cursor: pointer;
  }
  .colorPreviewRow {
    display: flex;
    gap: 6px;
    margin-bottom: 10px;
  }
  .colorPreviewSwatch {
    flex-shrink: 0;
    width: 26px;
    height: 26px;
    border-radius: 6px;
    border: 1px solid rgba(255,255,255,0.2);
  }
  #colorHex {
    flex: 1;
    min-width: 0;
    box-sizing: border-box;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    color: #cfcabb;
    padding: 5px 8px;
    border-radius: 6px;
    font-size: 12px;
    font-family: Menlo, monospace;
    text-transform: lowercase;
  }
  #colorHex:focus { outline: none; border-color: #f2b64c; }
  .recentColorsRow {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
  }
  .recentSwatch {
    width: 18px;
    height: 18px;
    border-radius: 5px;
    border: 1px solid rgba(255,255,255,0.2);
    cursor: pointer;
    padding: 0;
  }
  .recentSwatch:hover { border-color: #f2b64c; }
  #export {
    position: fixed;
    bottom: 16px;
    right: 16px;
    width: 220px;
    padding: 14px 16px;
    background: rgba(20, 20, 15, 0.72);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 10px;
    color: #e8e4d8;
  }
  #export h2 {
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin: 0 0 10px;
    color: #f2b64c;
  }
  #export .count {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: #cfcabb;
    margin-bottom: 4px;
  }
  #export .count .n {
    color: #f2b64c;
    font-variant-numeric: tabular-nums;
    font-weight: 600;
  }
  #export .breakdown {
    font-size: 10px;
    color: #706c5c;
    margin: 2px 0 8px;
    line-height: 1.5;
  }
  .exportTabs {
    display: flex;
    gap: 4px;
    margin-top: 10px;
  }
  .exportTabs button {
    flex: 1;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    color: #cfcabb;
    padding: 5px 0;
    border-radius: 6px;
    font-size: 11px;
    cursor: pointer;
  }
  .exportTabs button.active {
    background: #f2b64c;
    color: #14140f;
    border-color: #f2b64c;
    font-weight: 600;
  }
  .fileRow {
    display: flex;
    gap: 6px;
    margin-top: 8px;
  }
  #fileName {
    flex: 1;
    min-width: 0;
    box-sizing: border-box;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    color: #cfcabb;
    padding: 5px 8px;
    border-radius: 6px;
    font-size: 11px;
    font-family: Menlo, monospace;
  }
  #fileName:focus { outline: none; border-color: #f2b64c; }
  .iconBtn {
    flex-shrink: 0;
    width: 28px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    color: #cfcabb;
    border-radius: 6px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .iconBtn svg { width: 14px; height: 14px; display: block; }
  .iconBtn:hover { border-color: #f2b64c; color: #f2b64c; }
  .iconBtn.copied { background: #f2b64c; color: #14140f; border-color: #f2b64c; }
  .exportBtns {
    display: flex;
    gap: 4px;
    margin-top: 6px;
  }
  .exportBtns button {
    flex: 1;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    color: #cfcabb;
    padding: 6px 2px;
    border-radius: 6px;
    font-size: 10.5px;
    cursor: pointer;
  }
  .exportBtns button:hover {
    border-color: #f2b64c;
    color: #f2b64c;
  }
  .exportBtns button.copied {
    background: #f2b64c;
    color: #14140f;
    border-color: #f2b64c;
    font-weight: 600;
  }
  #structure {
    position: fixed;
    bottom: 16px;
    left: 16px;
    width: 210px;
    padding: 14px 16px;
    background: rgba(20, 20, 15, 0.72);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 10px;
    color: #e8e4d8;
  }
  #structure h2 {
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin: 0;
    color: #f2b64c;
  }
  .srow {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 12px;
    color: #cfcabb;
    margin-top: 8px;
  }
  .onoff {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    color: #cfcabb;
    padding: 4px 8px;
    border-radius: 6px;
    font-size: 11px;
    cursor: pointer;
    width: 56px;
  }
  .onoff.wide { width: 100%; }
  .rcPad { margin-top: 10px; }
  #rcCanvas {
    display: block;
    width: 100%;
    height: 108px;
    border-radius: 6px;
    touch-action: none;
    cursor: crosshair;
    margin-bottom: 6px;
  }
  .onoff.active {
    background: #f2b64c;
    color: #14140f;
    border-color: #f2b64c;
    font-weight: 600;
  }
  .diagGroup { display: flex; gap: 6px; align-items: center; }
  .diagGroup select {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    color: #cfcabb;
    font-size: 11px;
    border-radius: 6px;
    padding: 3px 4px;
    cursor: pointer;
    max-width: 108px;
  }
  .diagGroup select:focus { outline: none; border-color: #f2b64c; }
  #braceFlip, #rowBraceFlip, #colBraceFlip {
    width: 30px;
    font-family: Menlo, monospace;
    font-weight: 700;
    font-size: 13px;
  }
  #braceFlip:disabled, #rowBraceFlip:disabled, #colBraceFlip:disabled { opacity: 0.35; cursor: default; }
  #seriesNav {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    z-index: 200;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  #seriesHandle {
    width: 160px;
    height: 14px;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    cursor: pointer;
  }
  #seriesHandle span {
    margin-top: 4px;
    width: 36px;
    height: 4px;
    border-radius: 2px;
    background: rgba(255,255,255,0.18);
    transition: background 0.2s;
  }
  #seriesNav:hover #seriesHandle span { background: rgba(242,182,76,0.7); }
  #seriesTabs {
    display: flex;
    gap: 6px;
    padding: 8px 10px;
    background: rgba(20,20,15,0.9);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.08);
    border-top: none;
    border-radius: 0 0 10px 10px;
    opacity: 0;
    transform: translateY(-8px);
    pointer-events: none;
    transition: opacity 0.18s ease, transform 0.18s ease;
  }
  #seriesNav:hover #seriesTabs {
    opacity: 1;
    transform: translateY(0);
    pointer-events: auto;
  }
  .stab {
    font-size: 11px;
    padding: 6px 12px;
    border-radius: 6px;
    color: #cfcabb;
    white-space: nowrap;
    text-align: center;
  }
  .stab.active {
    background: #f2b64c;
    color: #14140f;
    font-weight: 600;
  }
  .stab.soon {
    color: #5c5940;
    cursor: default;
  }
  .stab.soon small {
    display: block;
    font-size: 9px;
    color: #4a4735;
    margin-top: 2px;
    font-weight: normal;
  }
  .stabShuffle {
    background: transparent;
    border: none;
    color: #cfcabb;
    padding: 6px 12px;
    border-radius: 6px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .stabShuffle:hover { color: #f2b64c; background: rgba(255,255,255,0.08); }
  .stabShuffle svg { width: 14px; height: 14px; display: block; }
  #errbox {
    display: none;
    position: fixed;
    bottom: 16px;
    left: 16px;
    right: 16px;
    padding: 12px 14px;
    background: rgba(80, 20, 20, 0.9);
    border: 1px solid #c0392b;
    border-radius: 8px;
    color: #f5d0c5;
    font-size: 12px;
    font-family: Menlo, monospace;
    white-space: pre-wrap;
    z-index: 99;
  }
</style>
</head>
<body>

<div id="seriesNav">
  <div id="seriesHandle"><span></span></div>
  <div id="seriesTabs">
    <div class="stab active">Cartesian Shelf</div>
    <div class="stab soon">Möbius Strip Lights<small>coming soon</small></div>
    <div class="stab soon">Klein Bottle<small>coming soon</small></div>
    <button class="stabShuffle" id="shuffleAll" title="Randomize everything"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 3 21 3 21 8"></polyline><line x1="4" y1="20" x2="21" y2="3"></line><polyline points="21 16 21 21 16 21"></polyline><line x1="15" y1="15" x2="21" y2="21"></line><line x1="4" y1="4" x2="9" y2="9"></line></svg></button>
  </div>
</div>

<div id="panel">
  <div class="panelHead">
    <h1>Dimensions</h1>
    <button class="shuffleBtn" id="shuffleDims" title="Randomize dimensions"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 3 21 3 21 8"></polyline><line x1="4" y1="20" x2="21" y2="3"></line><polyline points="21 16 21 21 16 21"></polyline><line x1="15" y1="15" x2="21" y2="21"></line><line x1="4" y1="4" x2="9" y2="9"></line></svg></button>
  </div>

  <div id="units">
    <button id="unit-mm" class="active">mm</button>
    <button id="unit-in">inches</button>
  </div>

  <div class="row">
    <label>Length (X) <input class="val" id="widVal" type="text" inputmode="decimal" /></label>
    <input type="range" id="wid" min="3" max="96" step="0.1" value="54" />
    <div class="mm" id="widMM"></div>
  </div>

  <div class="row">
    <label>Height (Y) <input class="val" id="hgtVal" type="text" inputmode="decimal" /></label>
    <input type="range" id="hgt" min="3" max="96" step="0.1" value="36" />
    <div class="mm" id="hgtMM"></div>
  </div>

  <div class="row">
    <label>Width (Z) <input class="val" id="depVal" type="text" inputmode="decimal" /></label>
    <input type="range" id="dep" min="3" max="48" step="0.1" value="24" />
    <div class="mm" id="depMM"></div>
  </div>

  <div class="row">
    <label><button class="swatchLabel" id="dwlSwatch">Dowel Radius</button> <input class="val" id="dwlVal" type="text" inputmode="decimal" /></label>
    <input type="range" id="dwl" min="0.1" max="1.5" step="0.05" value="0.5" />
    <div class="mm" id="dwlMM"></div>
  </div>
</div>

<div id="pad">
  <div class="panelHead">
    <h2>Tiling</h2>
    <button class="shuffleBtn" id="shuffleTiling" title="Randomize tiling"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 3 21 3 21 8"></polyline><line x1="4" y1="20" x2="21" y2="3"></line><polyline points="21 16 21 21 16 21"></polyline><line x1="15" y1="15" x2="21" y2="21"></line><line x1="4" y1="4" x2="9" y2="9"></line></svg></button>
  </div>
  <canvas id="padCanvas"></canvas>
  <div class="padrow"><span>Square Size</span><input class="val" id="sqsVal" type="text" inputmode="decimal" /><span class="pmm" id="sqsMM"></span></div>
  <div class="padrow"><span>Divisions</span><input class="val" id="divVal" type="text" inputmode="numeric" /><span class="pmm">longest axis</span></div>
</div>

<div id="structure">
  <div class="panelHead">
    <h2>Structure</h2>
    <button class="shuffleBtn" id="shuffleStructure" title="Randomize structure"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 3 21 3 21 8"></polyline><line x1="4" y1="20" x2="21" y2="3"></line><polyline points="21 16 21 21 16 21"></polyline><line x1="15" y1="15" x2="21" y2="21"></line><line x1="4" y1="4" x2="9" y2="9"></line></svg></button>
  </div>
  <div class="srow"><button class="swatchLabel" id="connSwatch">Connectors</button>
    <div class="diagGroup">
      <select id="connTypeSel">
        <option value="T">T</option>
        <option value="blob">Blob</option>
      </select>
    </div>
  </div>
  <div class="srow"><button class="swatchLabel" id="braceSwatch">Depth</button>
    <div class="diagGroup">
      <select id="braceSel">
        <option value="off">Off</option>
        <option value="identity">Identity</option>
        <option value="quadratic">Quadratic</option>
        <option value="abs">Absolute Value</option>
        <option value="zigzag">ZigZag</option>
        <option value="exponential">Exponential</option>
        <option value="cubic">Cubic</option>
        <option value="hyperbola">Hyperbola</option>
        <option value="circle">Unit Circle</option>
      </select>
      <button class="onoff" id="braceFlip" title="Flip orientation">/</button>
    </div>
  </div>
  <div class="srow"><button class="swatchLabel" id="rowBraceSwatch">Row</button>
    <div class="diagGroup">
      <select id="rowBraceSel">
        <option value="off">Off</option>
        <option value="identity">Identity</option>
        <option value="quadratic">Quadratic</option>
        <option value="abs">Absolute Value</option>
        <option value="zigzag">ZigZag</option>
        <option value="exponential">Exponential</option>
        <option value="cubic">Cubic</option>
        <option value="hyperbola">Hyperbola</option>
        <option value="circle">Unit Circle</option>
      </select>
      <button class="onoff" id="rowBraceFlip" title="Flip orientation">/</button>
    </div>
  </div>
  <div class="srow"><button class="swatchLabel" id="colBraceSwatch">Col</button>
    <div class="diagGroup">
      <select id="colBraceSel">
        <option value="off">Off</option>
        <option value="identity">Identity</option>
        <option value="quadratic">Quadratic</option>
        <option value="abs">Absolute Value</option>
        <option value="zigzag">ZigZag</option>
        <option value="exponential">Exponential</option>
        <option value="cubic">Cubic</option>
        <option value="hyperbola">Hyperbola</option>
        <option value="circle">Unit Circle</option>
      </select>
      <button class="onoff" id="colBraceFlip" title="Flip orientation">/</button>
    </div>
  </div>
  <div class="rcPad">
    <canvas id="rcCanvas"></canvas>
  </div>
  <div class="srow"><button class="onoff wide" id="openFrontBtn">Open Front</button></div>
</div>

<div id="export">
  <h2>Parts</h2>
  <div class="count">Connectors <span class="n" id="connCount"></span></div>
  <div class="breakdown" id="connBreakdown"></div>
  <div class="count">Dowels <span class="n" id="dowelCount"></span></div>
  <div class="breakdown" id="dowelBreakdown"></div>
  <div class="count">Braces <span class="n" id="braceCount"></span></div>
  <div class="breakdown" id="braceBreakdown"></div>
  <div class="count">Rows/Cols <span class="n" id="rcSkipDisplay"></span></div>

  <div class="exportTabs">
    <button class="tabBtn active" id="tabExportBtn">Export</button>
    <button class="tabBtn" id="tabSaveLoadBtn">Save / Load</button>
  </div>

  <div class="fileRow">
    <input type="text" id="fileName" spellcheck="false" />
    <button class="iconBtn" id="snapshotBtn" title="Save a snapshot (.png)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path><circle cx="12" cy="13" r="4"></circle></svg></button>

      (e.filename ? "\n" + e.filename + ":" + e.lineno : "");
